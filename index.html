<!doctype html>
<html lang="es">
  <head>
    <link rel="manifest" href="manifest.json" />

    <meta name="theme-color" content="#0f172a" />

    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta charset="UTF-8" />
    <!-- Configuración para dispositivos móviles -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- Ícono integrado (Un emoji de construcción) -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏗️</text></svg>"
    />
    <link
      rel="apple-touch-icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏗️</text></svg>"
    />

    <title>Calculadora CarLes</title>
    <!-- Tailwind CSS de respaldo por si hay internet -->
    <script src="https://tailwindcss.com"></script>

    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --border: #334155;
        --success: #10b981;
        --danger: #ef4444;
      }
      body {
        background-color: var(--bg);
        font-family: ui-sans-serif, system-ui, sans-serif;
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1rem;
        min-height: 100vh;
        margin: 0;
        box-sizing: border-box;
      }
      .wrapper {
        width: 100%;
        max-width: 54rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      .card {
        background-color: var(--card);
        border-radius: 1rem;
        border: 1px solid var(--border);
        padding: 1.5rem;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      }
      .header {
        text-align: center;
        margin-bottom: 1rem;
      }
      .header h1 {
        font-size: 1.5rem;
        font-weight: 800;
        margin: 0;
        background: linear-gradient(to right, #818cf8, #e0e7ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .header p {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin: 0.25rem 0 0 0;
        font-weight: 500;
      }

      .grid-inputs {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      @media (min-width: 640px) {
        .grid-inputs {
          grid-template-columns: 2fr 1fr 1fr 1.5fr;
        }
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.375rem;
      }
      .form-group label {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-muted);
      }
      .form-control {
        background-color: var(--bg);
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        color: var(--text);
        padding: 0.75rem;
        font-size: 1rem;
        outline: none;
        transition: border 0.2s;
        width: 100%;
        box-sizing: border-box;
        /* Evita el zoom automático en iPhone al tocar el input */
        font-size: 16px;
      }
      .form-control:focus {
        border-color: var(--primary);
      }

      .info-area {
        grid-column: 1 / -1;
        text-align: center;
        background: #1e293b;
        padding: 0.6rem;
        border-radius: 0.5rem;
        border: 1px dashed var(--border);
        color: var(--text-muted);
        font-size: 0.9rem;
      }
      .info-area strong {
        color: var(--primary);
        font-size: 1rem;
      }

      .table-container {
        overflow-x: auto;
        border-radius: 0.5rem;
        border: 1px solid var(--border);
        background-color: var(--bg);
        margin-top: 1rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        font-size: 0.925rem;
        min-width: 600px; /* Fuerza el scroll horizontal en móviles para que no se apriete */
      }
      th {
        background-color: #1e293b;
        color: var(--text-muted);
        font-weight: 600;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border);
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
      }
      td {
        padding: 0.85rem 1rem;
        border-bottom: 1px solid var(--border);
        color: #e2e8f0;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .text-right {
        text-align: right;
      }
      .total-row {
        background-color: #1e293b;
        font-weight: 700;
        font-size: 1.05rem;
      }
      .total-price {
        color: #818cf8;
        font-size: 1.15rem;
      }
      .bs-text {
        color: #f59e0b;
        font-size: 0.75rem;
        display: block;
        font-weight: 500;
      }

      .btn {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 0.625rem 1.25rem;
        font-weight: 600;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: background 0.2s;
        font-size: 0.875rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }
      .btn:hover {
        background-color: var(--primary-hover);
      }
      .btn-danger {
        background-color: var(--danger);
      }
      .btn-danger:hover {
        background-color: #dc2626;
      }
      .tabs {
        display: flex;
        gap: 0.5rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.5rem;
        margin-bottom: 1rem;
        overflow-x: auto;
      }
      .tab-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        font-weight: 600;
        padding: 0.5rem 1rem;
        cursor: pointer;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        white-space: nowrap;
      }
      .tab-btn.active {
        background-color: var(--border);
        color: var(--text);
      }

      .admin-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      @media (min-width: 768px) {
        .admin-grid {
          grid-template-columns: 1.2fr 1fr;
        }
      }
      .list-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.6rem 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.875rem;
      }
      .list-item:last-child {
        border-bottom: none;
      }

      .checkbox-list-container {
        background-color: var(--bg);
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        padding: 0.75rem;
        max-height: 200px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .checkbox-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        background: #1e293b;
        padding: 0.5rem;
        border-radius: 0.375rem;
        border: 1px solid #334155;
      }
      .checkbox-left {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        font-weight: 500;
      }
      .input-rendimiento-mini {
        width: 70px;
        padding: 0.25rem;
        background: #0f172a;
        border: 1px solid #475569;
        border-radius: 0.25rem;
        color: white;
        text-align: center;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <!-- CALCULADORA PRINCIPAL -->
      <div class="card">
        <div class="header">
          <h1>Calculadora CarLes</h1>
          <p>Estructura de Costos Multimoneda</p>
        </div>

        <div class="grid-inputs">
          <div class="form-group">
            <label for="tipoObra">Seleccione la Obra</label>
            <select
              id="tipoObra"
              class="form-control"
              onchange="calcular()"
            ></select>
          </div>
          <div style="display: flex; gap: 0.5rem">
            <div class="form-group" style="flex: 1">
              <label for="largo">Largo (m)</label>
              <input
                id="largo"
                type="number"
                min="0.1"
                step="0.1"
                value="4"
                class="form-control"
                oninput="calcular()"
              />
            </div>
            <div class="form-group" style="flex: 1">
              <label for="ancho">Ancho (m)</label>
              <input
                id="ancho"
                type="number"
                min="0.1"
                step="0.1"
                value="3.5"
                class="form-control"
                oninput="calcular()"
              />
            </div>
          </div>
          <div class="form-group">
            <label for="tasaBs">Tasa de Cambio</label>
            <input
              id="tasaBs"
              type="number"
              min="0.01"
              step="0.01"
              value="567.68"
              class="form-control"
              oninput="calcular()"
            />
          </div>

          <div class="info-area">
            Área: <strong id="areaTotalDisplay">14.00 m²</strong> &nbsp;|&nbsp;
            Perímetro: <strong id="perimetroDisplay">15.00 m</strong>
          </div>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Ítem</th>
                <th>Rend.</th>
                <th class="text-right">Cant.</th>
                <th class="text-right">Precio ($)</th>
                <th class="text-right">Subtotal</th>
              </tr>
            </thead>
            <tbody id="tablaMateriales"></tbody>
            <tfoot>
              <tr class="total-row">
                <td colspan="4" class="text-right">TOTAL EST.:</td>
                <td id="costoTotal" class="text-right total-price">
                  $0.00 <span class="bs-text" id="costoTotalBs">0.00 Bs.</span>
                </td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

      <!-- PANEL DE ADMINISTRACIÓN -->
      <div class="card">
        <div class="tabs">
          <button class="tab-btn active" onclick="cambiarTab('obras')">
            Obras / Proyectos
          </button>
          <button class="tab-btn" onclick="cambiarTab('materiales')">
            Materiales Base
          </button>
        </div>

        <!-- CRUD de Obras -->
        <div id="panel-obras" class="admin-grid" style="display: grid">
          <form
            id="formObra"
            onsubmit="guardarObra(event)"
            style="display: flex; flex-direction: column; gap: 0.75rem"
          >
            <h3 style="margin: 0; font-size: 1rem; font-weight: 700">
              Agregar Proyecto
            </h3>
            <div class="form-group">
              <label>Nombre del Proyecto</label>
              <input
                type="text"
                id="obraNombre"
                required
                class="form-control"
                placeholder="Ej: Techo Razo Especial"
              />
            </div>
            <div class="form-group">
              <label>Selecciona Materiales y Rendimiento</label>
              <div
                id="contenedorGanchitos"
                class="checkbox-list-container"
              ></div>
            </div>
            <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem">
              <button type="submit" class="btn" style="flex: 1">
                Guardar Obra
              </button>
              <button
                type="button"
                class="btn btn-danger"
                onclick="limpiarFormObra()"
              >
                X
              </button>
            </div>
          </form>
          <div>
            <h3
              style="margin: 0 0 0.75rem 0; font-size: 1rem; font-weight: 700"
            >
              Obras Configuradas
            </h3>
            <div
              id="listaObras"
              style="max-height: 380px; overflow-y: auto"
            ></div>
          </div>
        </div>

        <!-- CRUD de Materiales -->
        <div id="panel-materiales" class="admin-grid" style="display: none">
          <form
            id="formMaterial"
            onsubmit="guardarMaterial(event)"
            style="display: flex; flex-direction: column; gap: 0.75rem"
          >
            <h3 style="margin: 0; font-size: 1rem; font-weight: 700">
              Agregar Material
            </h3>
            <div class="form-group">
              <label>ID Único (Sin espacios, ej: anime)</label>
              <input
                type="text"
                id="matCodigo"
                required
                class="form-control"
                placeholder="Ej: anime"
              />
            </div>
            <div class="form-group">
              <label>Nombre Comercial</label>
              <input
                type="text"
                id="matNombre"
                required
                class="form-control"
                placeholder="Ej: Lámina de Anime"
              />
            </div>
            <div class="form-group">
              <label>Precio Unitario ($)</label>
              <input
                type="number"
                id="matPrecio"
                step="0.01"
                required
                class="form-control"
                placeholder="Ej: 2.50"
              />
            </div>
            <div style="display: flex; gap: 0.5rem">
              <button type="submit" class="btn" style="flex: 1">Guardar</button>
              <button
                type="button"
                class="btn btn-danger"
                onclick="limpiarFormMaterial()"
              >
                X
              </button>
            </div>
          </form>
          <div>
            <h3
              style="margin: 0 0 0.75rem 0; font-size: 1rem; font-weight: 700"
            >
              Base de Datos
            </h3>
            <div
              id="listaMaterialesBase"
              style="max-height: 250px; overflow-y: auto"
            ></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js");
        });
      }

      // DATOS DE RESPALDO POR DEFECTO
      const materialesPredeterminados = {
        anime: { nombre: "Lámina Anime (1.22x0.60)", precio: 3.5 },
        perfil_princ: { nombre: "Perfil Princ (3.60m)", precio: 12.0 },
        perfil_sec: { nombre: "Perfil Sec (1.22m)", precio: 3.71 },
        angulo: { nombre: "Ángulo Perim (3.66m)", precio: 8.1 },
        pvc: { nombre: "Lámina PVC (0.30x5.93)", precio: 24.0 },
      };

      const obrasPredeterminadas = {
        "Techo Razo Completo": [
          { material: "anime", rendimiento: 0.732 },
          { material: "perfil_princ", rendimiento: 3.44 },
          { material: "perfil_sec", rendimiento: 1.21 },
          { material: "angulo", rendimiento: 5.0 },
        ],
        "Techo Láminas PVC": [{ material: "pvc", rendimiento: 1.779 }],
      };

      let BD_MATERIALES =
        JSON.parse(localStorage.getItem("bd_mat_v7")) ||
        materialesPredeterminados;
      let BD_OBRAS =
        JSON.parse(localStorage.getItem("bd_obr_v7")) || obrasPredeterminadas;

      function guardarEnStorage() {
        localStorage.setItem("bd_mat_v7", JSON.stringify(BD_MATERIALES));
        localStorage.setItem("bd_obr_v7", JSON.stringify(BD_OBRAS));
      }

      function inicializar() {
        actualizarSelectObras();
        renderizarGanchitos();
        renderizarListasAdmin();
        calcular();
      }

      function actualizarSelectObras() {
        const selectObra = document.getElementById("tipoObra");
        selectObra.innerHTML = Object.keys(BD_OBRAS)
          .map((n) => `<option value="${n}">${n}</option>`)
          .join("");
      }

      function renderizarGanchitos() {
        const div = document.getElementById("contenedorGanchitos");
        div.innerHTML = Object.keys(BD_MATERIALES)
          .map(
            (k) => `
            <div class="checkbox-row">
                <label class="checkbox-left">
                    <input type="checkbox" value="${k}" class="mat-checkbox" onchange="conmutarRendimiento('${k}')">
                    <span>${BD_MATERIALES[k].nombre}</span>
                </label>
                <input type="number" step="0.0001" id="rend_${k}" placeholder="Rend." disabled class="input-rendimiento-mini">
            </div>
        `,
          )
          .join("");
      }

      function conmutarRendimiento(codigo) {
        const check = document.querySelector(`input[value="${codigo}"]`);
        const input = document.getElementById(`rend_${codigo}`);
        input.disabled = !check.checked;
        if (check.checked && !input.value) input.value = "1";
      }

      function calcular() {
        const obraSeleccionada = document.getElementById("tipoObra").value;
        const largo = parseFloat(document.getElementById("largo").value) || 0;
        const ancho = parseFloat(document.getElementById("ancho").value) || 0;
        const tasa = parseFloat(document.getElementById("tasaBs").value) || 1;
        const tbody = document.getElementById("tablaMateriales");

        const area = largo * ancho;
        const perimetro = 2 * (largo + ancho);

        document.getElementById("areaTotalDisplay").textContent =
          area.toFixed(2) + " m²";
        document.getElementById("perimetroDisplay").textContent =
          perimetro.toFixed(2) + " m";

        const formatoBs = new Intl.NumberFormat("es-VE", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });

        if (area <= 0 || !obraSeleccionada || !BD_OBRAS[obraSeleccionada]) {
          tbody.innerHTML =
            '<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Escribe dimensiones válidas.</td></tr>';
          document.getElementById("costoTotal").innerHTML =
            `$0.00 <span class="bs-text">0,00 Bs.</span>`;
          return;
        }

        const components = BD_OBRAS[obraSeleccionada];
        let html = "";
        let totalUSD = 0;

        components.forEach((comp) => {
          const mat = BD_MATERIALES[comp.material];
          if (mat) {
            let cantidad = Math.ceil(area / comp.rendimiento);

            if (
              comp.material === "perfil_princ" &&
              obraSeleccionada.includes("Techo Razo")
            )
              cantidad = Math.ceil(area * 0.29) || 1;
            if (
              comp.material === "perfil_sec" &&
              obraSeleccionada.includes("Techo Razo")
            )
              cantidad = Math.ceil(area * 0.82) || 1;
            if (
              comp.material === "angulo" &&
              obraSeleccionada.includes("Techo Razo")
            )
              cantidad = Math.ceil(perimetro / 3.66) || 1;

            const subtotalUSD = cantidad * mat.precio;
            const subtotalBS = subtotalUSD * tasa;
            totalUSD += subtotalUSD;

            html += `
                    <tr>
                        <td><span style="font-weight:600;">${mat.nombre}</span></td>
                        <td style="color:var(--text-muted);">${comp.rendimiento}</td>
                        <td class="text-right" style="font-weight:700; color:#cbd5e1;">${cantidad}</td>
                        <td class="text-right">$${mat.precio.toFixed(2)}</td>
                        <td class="text-right" style="font-weight:700; color:#10b981;">
                            $${subtotalUSD.toFixed(2)}
                            <span class="bs-text">${formatoBs.format(subtotalBS)} Bs.</span>
                        </td>
                    </tr>
                `;
          }
        });

        tbody.innerHTML =
          html ||
          '<tr><td colspan="5" style="text-align:center;">No hay materiales.</td></tr>';
        document.getElementById("costoTotal").innerHTML =
          `$${totalUSD.toFixed(2)} <span class="bs-text" style="color:#f59e0b; font-size:1rem; font-weight:700; margin-top:0.25rem;">${formatoBs.format(totalUSD * tasa)} Bs.</span>`;
      }

      function cambiarTab(tipo) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        event.target.classList.add("active");
        document.getElementById("panel-obras").style.display =
          tipo === "obras" ? "grid" : "none";
        document.getElementById("panel-materiales").style.display =
          tipo === "materiales" ? "grid" : "none";
      }

      function guardarObra(e) {
        e.preventDefault();
        const nombre = document.getElementById("obraNombre").value.trim();
        const checkboxes = document.querySelectorAll(".mat-checkbox:checked");
        if (checkboxes.length === 0)
          return alert("Selecciona al menos un material.");

        BD_OBRAS[nombre] = Array.from(checkboxes).map((cb) => ({
          material: cb.value,
          rendimiento:
            parseFloat(document.getElementById(`rend_${cb.value}`).value) || 1,
        }));
        guardarEnStorage();
        inicializar();
        limpiarFormObra();
      }

      function eliminarObra(nombre) {
        if (confirm(`¿Eliminar la obra: ${nombre}?`)) {
          delete BD_OBRAS[nombre];
          guardarEnStorage();
          inicializar();
        }
      }

      function editarObra(nombre) {
        limpiarFormObra();
        document.getElementById("obraNombre").value = nombre;
        BD_OBRAS[nombre].forEach((comp) => {
          const check = document.querySelector(
            `.mat-checkbox[value="${comp.material}"]`,
          );
          if (check) {
            check.checked = true;
            document.getElementById(`rend_${comp.material}`).disabled = false;
            document.getElementById(`rend_${comp.material}`).value =
              comp.rendimiento;
          }
        });
      }

      function limpiarFormObra() {
        document.getElementById("formObra").reset();
        document
          .querySelectorAll(".input-rendimiento-mini")
          .forEach((i) => (i.disabled = true));
      }

      function guardarMaterial(e) {
        e.preventDefault();
        const codigo = document
          .getElementById("matCodigo")
          .value.trim()
          .toLowerCase();
        BD_MATERIALES[codigo] = {
          nombre: document.getElementById("matNombre").value.trim(),
          precio: parseFloat(document.getElementById("matPrecio").value),
        };
        guardarEnStorage();
        inicializar();
        document.getElementById("formMaterial").reset();
      }

      function eliminarMaterial(codigo) {
        if (confirm(`¿Eliminar este material?`)) {
          delete BD_MATERIALES[codigo];
          Object.keys(BD_OBRAS).forEach((o) => {
            BD_OBRAS[o] = BD_OBRAS[o].filter(
              (comp) => comp.material !== codigo,
            );
            if (BD_OBRAS[o].length === 0) delete BD_OBRAS[o];
          });
          guardarEnStorage();
          inicializar();
        }
      }

      function editarMaterial(codigo) {
        document.getElementById("matCodigo").value = codigo;
        document.getElementById("matNombre").value =
          BD_MATERIALES[codigo].nombre;
        document.getElementById("matPrecio").value =
          BD_MATERIALES[codigo].precio;
      }

      function limpiarFormMaterial() {
        document.getElementById("formMaterial").reset();
      }

      function renderizarListasAdmin() {
        document.getElementById("listaMaterialesBase").innerHTML = Object.keys(
          BD_MATERIALES,
        )
          .map(
            (k) =>
              `<div class="list-item"><div><strong style="color:#818cf8;">[${k}]</strong> ${BD_MATERIALES[k].nombre} - <strong>$${BD_MATERIALES[k].precio.toFixed(2)}</strong></div><div style="display:flex; gap:0.25rem;"><button class="btn" style="padding:0.25rem 0.5rem; background:#334155;" onclick="editarMaterial('${k}')">✏️</button><button class="btn btn-danger" style="padding:0.25rem 0.5rem;" onclick="eliminarMaterial('${k}')">🗑️</button></div></div>`,
          )
          .join("");
        document.getElementById("listaObras").innerHTML = Object.keys(BD_OBRAS)
          .map(
            (nombre) =>
              `<div class="list-item"><div><strong>${nombre}</strong><br><span style="font-size:0.75rem; color:var(--text-muted);">${BD_OBRAS[nombre].length} materiales</span></div><div style="display:flex; gap:0.25rem;"><button class="btn" style="padding:0.25rem 0.5rem; background:#334155;" onclick="editarObra('${nombre}')">✏️</button><button class="btn btn-danger" style="padding:0.25rem 0.5rem;" onclick="eliminarObra('${nombre}')">🗑️</button></div></div>`,
          )
          .join("");
      }

      inicializar();
    </script>
  </body>
</html>
